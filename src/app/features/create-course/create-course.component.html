<div class="container py-4">
  <div class="card shadow-sm border-0 rounded-4">
    <div class="card-header bg-white py-3 border-bottom">
      <h2 class="h4 mb-0 fw-bold text-primary">{{ isEditMode ? 'Update Course' : 'Create New Course' }}</h2>
    </div>
    <div class="card-body p-4">
      <form [formGroup]="courseForm" (ngSubmit)="onSubmit()">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">Name</label>
            <input type="text" formControlName="name" class="form-control rounded-3" placeholder="Enter course name">
          </div>

          <div class="col-md-3">
            <label class="form-label fw-semibold">Type</label>
            <select formControlName="type" class="form-select rounded-3">
              <option value="" disabled>Select level</option>
              <option value="basic">basic</option>
              <option value="intermediate">intermediate</option>
              <option value="advance">advance</option>
            </select>
          </div>

          <div class="col-md-3">
            <label class="form-label fw-semibold">Category</label>
            <select formControlName="category" class="form-select rounded-3">
              <option value="" disabled>Select category</option>
              <option value="web">web</option>
              <option value="mobile">mobile</option>
              <option value="backend">backend</option>
              <option value="frontend">frontend</option>
              <option value="full_stack">full_stack</option>
              <option value="mean_stack">mean_stack</option>
              <option value="mern_stack">mern_stack</option>
              <option value="dev_ops">dev_ops</option>
              <option value="ux/ui">ux/ui</option>
              <option value="cyber_security">cyber_security</option>
              <option value="internship">internship</option>
            </select>
          </div>

          <div class="col-md-12">
            <label class="form-label fw-semibold">Description</label>
            <textarea formControlName="description" class="form-control rounded-3" rows="2" placeholder="Enter course description"></textarea>
          </div>

          <div class="col-md-4">
            <label class="form-label fw-semibold">Tag</label>
            <input type="text" formControlName="tag" class="form-control rounded-3" placeholder="e.g. Best Seller">
          </div>

          <div class="col-md-4">
            <label class="form-label fw-semibold">Rating</label>
            <input type="number" formControlName="rating" class="form-control rounded-3" step="0.1" min="0" max="5">
          </div>

          <!-- Image upload field -->
          <div class="col-md-4">
            <label class="form-label fw-semibold">Course Image</label>
            <div class="d-flex flex-column gap-2">
              <input type="file" (change)="onFileSelected($event)" class="form-control rounded-3" accept="image/*">
              <div *ngIf="imagePreview" class="mt-2 text-center bg-light p-2 rounded-3">
                <img [src]="imagePreview | imagePath" class="img-thumbnail rounded-3" style="max-height: 120px;" alt="Course Preview">
              </div>
            </div>
          </div>

          <div class="col-md-3">
            <label class="form-label fw-semibold">Price</label>
            <input type="number" formControlName="price" class="form-control rounded-3">
          </div>

          <div class="col-md-3">
            <label class="form-label fw-semibold">Discount Type</label>
            <select formControlName="discountType" class="form-select rounded-3">
              <option value="Percentage">Percentage</option>
              <option value="Fixed">Fixed Amount</option>
            </select>
          </div>

          <div class="col-md-3">
            <label class="form-label fw-semibold">Discount</label>
            <input type="number" formControlName="discount" class="form-control rounded-3">
          </div>

          <div class="col-md-3">
            <label class="form-label fw-semibold">Final Price</label>
            <input type="number" formControlName="finalPrice" class="form-control rounded-3">
          </div>

          <div class="col-12">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" formControlName="active" id="activeSwitch">
              <label class="form-check-label fw-semibold" for="activeSwitch">Active</label>
            </div>
          </div>

          <div class="col-12 mt-4 pt-3 border-top">
            <div class="d-flex flex-wrap gap-2 justify-content-end">
              @if (isEditMode) {
                <button type="button" class="btn btn-danger rounded-pill px-4 me-auto" (click)="onDelete()">
                  <i class="bi bi-trash me-1"></i> Delete
                </button>
              }
              <!-- <button type="button" class="btn btn-light rounded-pill px-4" (click)="router.navigate(['/features/courses'])">Cancel</button> -->
              <button type="submit" class="btn btn-primary rounded-pill px-4" [disabled]="courseForm.invalid || isLoading">
                <i class="bi" [class.bi-plus-circle]="!isEditMode" [class.bi-check-circle]="isEditMode"></i>
                {{ isEditMode ? ' Update Course' : ' Create Course' }}
              </button>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
